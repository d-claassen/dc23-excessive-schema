name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wordpress }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        wordpress: ['6.7', 'latest']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Set up WordPress test environment
        run: |
          bash <(curl -s "https://raw.githubusercontent.com/wp-cli/scaffold-command/master/templates/install-wp-tests.sh") wordpress_test root root 127.0.0.1 ${{ matrix.wordpress }}

      - name: Run tests
        run: composer test
